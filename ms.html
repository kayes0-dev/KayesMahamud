<!DOCTYPE html>
<html>
<head>
<title>Second Life Signup</title>

</div>

</div>


<div class="row">

<div class="input-box">
<label>SECURITY QUESTION</label>
<select>
<option>What city were you born in?</option>
</select>
</div>

<div class="input-box">
<label>ANSWER</label>
<input type="text" placeholder="Enter the answer">
</div>

</div>

<div class="checkbox">
<input type="checkbox"> I would like to receive news and special offers.
</div>

<button>Create account</button>

</form>
